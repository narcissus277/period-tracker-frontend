<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌙 牵牵的月相</title>
<style>
body{margin:0;padding:20px;font-family:-apple-system,sans-serif;background:#FFF9F0;color:#4A3F35;}
h1{font-weight:300;font-size:22px;letter-spacing:2px;}
p{color:#8A7A6A;font-size:13px;line-height:1.8;}
.card{background:rgba(255,248,235,0.8);border:1px solid rgba(200,180,150,0.2);border-radius:18px;padding:18px;margin-top:20px;}
.ring{width:100px;height:100px;border-radius:50%;border:7px solid #E8A090;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.ring-inner{text-align:center;}
.ring-day{font-size:26px;}
.ring-label{font-size:9px;color:#B8A99A;}
#msg{text-align:center;margin-top:20px;font-size:12px;color:#B8A99A;}
</style>
</head>
<body>
<h1>🌙 牵牵的月相</h1>
<p style="letter-spacing:2.5px;font-size:10px;text-transform:uppercase">by 德拉 · 守护你每一天</p>
<div class="card">
  <div class="ring">
    <div class="ring-inner">
      <div class="ring-day">1</div>
      <div class="ring-label">第 1 天</div>
    </div>
  </div>
  <p style="text-align:center;margin-top:16px;font-size:20px;letter-spacing:1px">月经期</p>
  <p style="text-align:center;font-size:11px">注意保暖，多喝热水</p>
</div>
<div id="msg">JS 加载中...</div>
<script>
document.getElementById('msg').textContent='✅ JS 执行成功！';
</script>
</body>
</html>
