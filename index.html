async function qry(path,opts){
  var h=new Headers();
  h.set('apikey',_KEY);
  h.set('Authorization','Bearer '+_KEY);
  h.set('Content-Type','application/json');
  h.set('Prefer','return=representation');
  var r=await fetch(_URL+'/rest/v1'+path,
    {method:'GET',headers:h,...opts});
  if(!r.ok){throw new Error(await r.text());}
  return await r.json();
}
