<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>🌙 牵牵的月相</title>
<style>
:root{--bg-from:#FFF9F0;--bg-mid:#FFFDF5;--bg-to:#FFFBF0;--card:rgba(255,248,235,0.8);--card-border:rgba(200,180,150,0.2);--text:#4A3F35;--text-dim:#B8A99A;--text-mid:#8A7A6A;--accent:#D48C7A;--period:#E8A090;--follicular:#7EB8D8;--ovulation:#5CD0A0;--luteal:#D4B060;--today:#4ECDC4;--predict:#9B8AF0;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#FFF9F0;color:#4A3F35;}
.serif{font-family:Georgia,'Times New Roman',serif;}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;max-width:480px;margin:0 auto;}
.top-area{flex-shrink:0;padding-top:env(safe-area-inset-top,0);}
.page-header{text-align:center;padding:24px 20px 14px;}
.page-title{font-size:22px;font-weight:300;color:#4A3F35;letter-spacing:2px;}
.page-sub{font-size:10px;color:#B8A99A;letter-spacing:2.5px;margin-top:5px;text-transform:uppercase;}
.tab-bar{display:flex;position:relative;border-bottom:1px solid rgba(150,130,110,0.15);padding:0 24px;margin-top:4px;}
.tab{flex:1;text-align:center;padding:12px 0 13px;font-size:13px;color:#B8A99A;letter-spacing:.5px;cursor:pointer;user-select:none;}
.tab.active{color:#4A3F35;}
.tab-line{position:absolute;bottom:-1px;height:1.5px;background:rgba(200,220,255,0.6);border-radius:2px 2px 0 0;transition:left .3s,width .3s;left:24px;width:calc(50% - 24px);}
.swipe-container{flex:1;overflow:hidden;position:relative;}
.swipe-wrapper{display:flex;height:100%;transition:transform .35s;will-change:transform;}
.swipe-page{flex:0 0 100%;width:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,0);}
.section{margin:0 16px 14px;background:rgba(255,248,235,0.8);border:1px solid rgba(200,180,150,0.2);border-radius:18px;padding:18px;}
.section-top{margin-top:20px;}
.ring-row{display:flex;align-items:center;gap:20px;margin-bottom:18px;}
.ring-wrap{position:relative;width:100px;height:100px;flex-shrink:0;}
.ring-wrap svg{width:100px;height:100px;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.ring-day{font-size:26px;font-weight:300;color:#4A3F35;line-height:1;}
.ring-day-label{font-size:9px;color:#B8A99A;}
.phase-name{font-size:20px;font-weight:300;letter-spacing:1px;margin-bottom:6px;}
.phase-desc{font-size:11px;color:#8A7A6A;line-height:1.8;font-weight:300;}
.phase-next{font-size:11px;color:#9B8AF0;margin-top:8px;}
.sep{height:1px;background:rgba(255,255,255,0.06);margin:16px 0;}
.timeline{display:flex;flex-direction:column;}
.tl-row{display:flex;gap:14px;align-items:stretch;}
.tl-left{display:flex;flex-direction:column;align-items:center;width:18px;flex-shrink:0;padding-top:2px;}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.tl-row.curr .tl-dot{box-shadow:0 0 0 3px rgba(255,255,255,0.1);}
.tl-line{width:1px;background:rgba(255,255,255,0.06);flex:1;margin:4px 0;}
.tl-row:last-child .tl-line{display:none;}
.tl-right{flex:1;padding-bottom:14px;}
.tl-row:last-child .tl-right{padding-bottom:0;}
.tl-name{font-size:12px;color:#8A7A6A;display:flex;justify-content:space-between;align-items:baseline;font-weight:300;}
.tl-row.curr .tl-name{color:#4A3F35;}
.tl-range{font-size:10px;color:#B8A99A;}
.tl-desc{font-size:10px;color:#B8A99A;margin-top:3px;line-height:1.6;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 16px 14px;}
.stat-item{background:rgba(255,248,235,0.8);border:1px solid rgba(200,180,150,0.2);border-radius:14px;padding:12px 8px;text-align:center;}
.stat-value{font-size:14px;color:#4A3F35;font-weight:300;letter-spacing:.5px;}
.stat-label{font-size:9px;color:#B8A99A;margin-top:5px;letter-spacing:1px;text-transform:uppercase;}
.hist-title{font-size:10px;color:#B8A99A;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.hist-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,248,235,0.5);}
.hist-item:last-child{border-bottom:none;}
.hist-dot{width:5px;height:5px;border-radius:50%;background:#D48C7A;flex-shrink:0;}
.hist-date{font-size:13px;font-weight:300;letter-spacing:.5px;}
.hist-meta{font-size:10px;color:#B8A99A;margin-left:auto;}
.hist-del{font-size:10px;color:#B8A99A;padding:3px 8px;border:1px solid rgba(255,255,255,0.08);border-radius:20px;cursor:pointer;margin-left:8px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;margin-bottom:16px;}
.cal-month{font-size:22px;font-weight:300;letter-spacing:2px;}
.cal-year{font-size:10px;color:#B8A99A;letter-spacing:3px;margin-top:2px;}
.cal-arrows{display:flex;align-items:center;gap:16px;}
.cal-arr{font-size:14px;color:#B8A99A;cursor:pointer;padding:6px;}
.cal-today-btn{font-size:10px;color:#8A7A6A;cursor:pointer;padding:5px 10px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;}
.cal-wrap{padding:0 16px;}
.wday-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px;}
.wday{text-align:center;font-size:9px;color:#B8A99A;padding:4px 0;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day{height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;gap:4px;cursor:pointer;position:relative;}
.day.empty{cursor:default;pointer-events:none;}
.day-num{font-size:13px;font-weight:300;color:#B8A99A;line-height:1;}
.day-dot{width:5px;height:5px;border-radius:50%;opacity:0;}
.day.phase-period .day-num{color:#E8A090;}
.day.phase-period .day-dot{background:#E8A090;opacity:1;}
.day.phase-follicular .day-num{color:#7EB8D8;}
.day.phase-follicular .day-dot{background:#7EB8D8;opacity:1;}
.day.phase-ovulation .day-num{color:#5CD0A0;}
.day.phase-ovulation .day-dot{background:#5CD0A0;opacity:1;}
.day.phase-luteal .day-num{color:#D4B060;}
.day.phase-luteal .day-dot{background:#D4B060;opacity:1;}
.day.is-today::after{content:'';position:absolute;bottom:3px;width:3px;height:3px;border-radius:50%;background:#4ECDC4;}
.day.selected{outline:1.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);}
.legend{display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center;padding:14px 16px 0;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:9px;color:#B8A99A;}
.legend-dot{width:7px;height:7px;border-radius:50%;}
.phase-strip{margin:14px 16px 0;display:flex;flex-direction:column;gap:8px;}
.phase-strip-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(255,248,235,0.8);border:1px solid rgba(200,180,150,0.2);border-radius:12px;}
.ps-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ps-info{flex:1;}
.ps-name{font-size:12px;font-weight:300;}
.ps-tip{font-size:10px;color:#B8A99A;margin-top:2px;}
.ps-tag{font-size:9px;padding:3px 9px;border-radius:20px;flex-shrink:0;}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;transition:background .25s;}
.sheet-overlay.open{background:rgba(0,0,0,0.15);pointer-events:auto;}
.sheet{width:100%;max-width:480px;background:#FFF9F0;border-radius:22px 22px 0 0;padding:16px 20px calc(24px + env(safe-area-inset-bottom,0));transform:translateY(100%);transition:transform .3s;border-top:1px solid rgba(255,255,255,0.08);}
.sheet-overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;margin:0 auto 18px;}
.sheet-date-label{font-size:12px;color:#8A7A6A;margin-bottom:4px;}
.sheet-title{font-size:18px;font-weight:300;letter-spacing:1px;margin-bottom:18px;}
.sheet-options{display:flex;flex-direction:column;gap:10px;}
.sheet-opt{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:14px;background:rgba(255,248,235,0.5);border:1px solid rgba(255,255,255,0.06);cursor:pointer;}
.sheet-opt.active{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);}
.sheet-opt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sheet-opt-info{flex:1;}
.sheet-opt-name{font-size:13px;font-weight:300;}
.sheet-opt-sub{font-size:10px;color:#B8A99A;margin-top:3px;}
.sheet-check{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;}
.sheet-opt.active .sheet-check{background:#D48C7A;border-color:#D48C7A;color:white;}
.duration-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0 0;}
.duration-label{font-size:12px;color:#8A7A6A;}
.duration-ctrl{display:flex;align-items:center;gap:14px;}
.dur-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#4A3F35;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;}
.dur-val{font-size:16px;font-weight:300;min-width:24px;text-align:center;}
.sheet-btns{display:flex;gap:10px;margin-top:18px;}
.btn-cancel{flex:1;padding:13px;border-radius:12px;background:rgba(255,248,235,0.5);border:1px solid rgba(255,255,255,0.08);color:#8A7A6A;font-size:13px;font-family:-apple-system,sans-serif;cursor:pointer;}
.btn-save{flex:2;padding:13px;border-radius:12px;background:#D48C7A;border:none;color:white;font-size:13px;font-family:-apple-system,sans-serif;cursor:pointer;letter-spacing:.5px;}
.btn-save:disabled{opacity:.4;cursor:not-allowed;}
.loading-state{text-align:center;padding:60px 20px;color:#B8A99A;font-size:13px;}
.toast{position:fixed;top:calc(20px + env(safe-area-inset-top,0));left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(20,30,56,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:30px;padding:10px 20px;font-size:12px;color:#4A3F35;z-index:300;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <div class="top-area">
    <div class="page-header serif">
      <div class="page-title">牵牵的月相</div>

        </div>

          <div class="legend-item"><div class="legend-dot" style="background:#D4B060"></div>黄体期</div>
          <div class="legend-item"><div class="legend-dot" style="background:#4ECDC4"></div>今天</div>
        </div>
        <div class="phase-strip" id="phase-strip"></div>
      </div>
    </div>
  </div>
</div>
<div class="sheet-overlay" id="sheet-overlay" onclick="onOverlayClick(event)">
  <div class="sheet serif">
    <div class="sheet-handle"></div>
    <div class="sheet-date-label" id="sheet-date"></div>
    <div class="sheet-title">记录这一天</div>
    <div class="sheet-options">
      <div class="sheet-opt active" id="opt-period" onclick="selectOpt('period')">
        <div class="sheet-opt-dot" style="background:#E8A090"></div>
        <div class="sheet-opt-info"><div class="sheet-opt-name">月经期开始</div><div class="sheet-opt-sub">自动标注后续天数，重新计算预测</div></div>
        <div class="sheet-check">✓</div>
      </div>
      <div class="sheet-opt" id="opt-ovulation" onclick="selectOpt('ovulation')">
        <div class="sheet-opt-dot" style="background:#5CD0A0"></div>

</div>

<script>
const _URL='https://mxfvgspptteadirmpjqy.supabase.co';
const _KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZnZnc3BwdHRlYWRpcm1wanF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTQyMzAsImV4cCI6MjA5Nzc3MDIzMH0.HVeDbsECu7v0PVuggG4gnroXZj4aRv7IhR_AJ79BHh0';
async function qry(path,opts){
  var h=new Headers();h.set('apikey',_KEY);h.set('Authorization','Bearer '+_KEY);h.set('Content-Type','application/json');h.set('Prefer','return=representation');
  var r=await fetch(_URL+'/rest/v1'+path,{method:'GET',headers:h,...opts});
  if(!r.ok){throw new Error(await r.text());}return await r.json();
}
var records=[],ovulRecords=[],avgCycle=28,curYear=(new Date()).getFullYear(),curMonth=(new Date()).getMonth();
var selectedDate=null,selectedOpt='period',duration=5,currentTab=0;
function fmt(d){var m=d.getMonth()+1;var day=d.getDate();return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(day<10?'0':'')+day;}
function fmtDisplay(s){var d=new Date(s+'T00:00:00');return (d.getMonth()+1)+'月'+d.getDate()+'日';}
function fmtDateLabel(s){var d=new Date(s+'T00:00:00');var days=['日','一','二','三','四','五','六'];return (d.getMonth()+1)+'月'+d.getDate()+'日 · 周'+days[d.getDay()];}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function calcCycle(){
  var real=[];for(var i=0;i<records.length;i++){if(records[i].notes!=='marked')real.push(records[i]);}
  if(real.length===0)return{avgCycle:28,latest:null,nextPredicted:null,daysInCycle:0,currentPhase:null};
  real.sort(function(a,b){return new Date(b.start_date)-new Date(a.start_date);});
  var latest=real[0];var cycle=28;
  if(real.length>=2){var total=0,count=0;for(var i=0;i<real.length-1;i++){var diff=(new Date(real[i].start_date)-new Date(real[i+1].start_date))/86400000;if(diff>15&&diff<65){total+=diff;count++;}}if(count>0)cycle=Math.round(total/count);}
  avgCycle=cycle;var today=new Date();today.setHours(0,0,0,0);
  var lastStart=new Date(latest.start_date+'T00:00:00');var daysIn=Math.floor((today-lastStart)/86400000);
  var nextDate=new Date(lastStart);nextDate.setDate(nextDate.getDate()+cycle);var daysUntil=Math.floor((nextDate-today)/86400000);
  var ovulDay=cycle-14;var phase=null;
  if(daysIn>=0&&daysIn<cycle){if(daysIn<5)phase='period';else if(daysIn<ovulDay-1)phase='follicular';else if(daysIn<=ovulDay+1)phase='ovulation';else phase='luteal';}
  return{avgCycle:cycle,latest:latest,nextPredicted:fmt(nextDate),daysInCycle:daysIn,daysUntilNext:daysUntil,currentPhase:phase};
}
function getPhaseForDate(ds){
  var real=[];for(var i=0;i<records.length;i++){if(records[i].notes!=='marked')real.push(records[i]);}
  if(real.length===0)return null;var target=new Date(ds+'T00:00:00');var ovulOff=avgCycle-14;
  real.sort(function(a,b){return new Date(b.start_date)-new Date(a.start_date);});
  for(var i=0;i<real.length;i++){var start=new Date(real[i].start_date+'T00:00:00');var day=Math.floor((target-start)/86400000);if(day>=0&&day<avgCycle){if(day<real[i].duration)return{phase:'period',isStart:day===0};if(day<ovulOff-1)return{phase:'follicular',isStart:false};if(day<=ovulOff+1)return{phase:'ovulation',isStart:day===ovulOff};return{phase:'luteal',isStart:false};}}
  var nextStart=new Date(real[0].start_date+'T00:00:00');nextStart.setDate(nextStart.getDate()+avgCycle);var day=Math.floor((target-nextStart)/86400000);
  if(day>=0&&day<avgCycle){if(day<5)return{phase:'pred-period',isStart:day===0};if(day<ovulOff-1)return{phase:'pred-follicular',isStart:false};if(day<=ovulOff+1)return{phase:'pred-ovulation',isStart:false};return{phase:'pred-luteal',isStart:false};}
  return null;
}
var PHASE_INFO={period:{name:'月经期',color:'#E8A090',desc:'注意保暖，多喝热水，避免剧烈运动，可以热敷缓解不适'},follicular:{name:'卵泡期',color:'#7EB8D8',desc:'雌激素升高，精力充沛，适合运动和开始新计划'},ovulation:{name:'排卵期',color:'#5CD0A0',desc:'体温微升，白带拉丝，是排卵日前后各一天'},luteal:{name:'黄体期',color:'#D4B060',desc:'孕酮升高，容易疲惫，情绪敏感，补充维生素B6有帮助'}};
function renderStatus(){
  var info=calcCycle();var sec=document.getElementById('status-section');
  if(!info.latest){sec.innerHTML='<div style="text-align:center;padding:24px 0"><div style="font-size:32px;margin-bottom:10px">🌙</div><div style="color:#B8A99A;font-size:13px">还没有记录，去日历页添加第一条吧</div></div>';return;}
  var ph=PHASE_INFO[info.currentPhase]||PHASE_INFO.luteal;var ovulDay=info.avgCycle-14;
  var sections=[{key:'period',name:'月经期',range:'第 1–5 天',desc:'保暖休息，热敷缓解',color:'#E8A090'},{key:'follicular',name:'卵泡期',range:'第 6–'+(ovulDay-2)+' 天',desc:'精力旺盛，适合运动',color:'#7EB8D8'},{key:'ovulation',name:'排卵期',range:'第 '+ovulDay+' 天',desc:'体温微升，白带拉丝',color:'#5CD0A0'},{key:'luteal',name:'黄体期',range:'第 '+(ovulDay+2)+'–'+info.avgCycle+' 天',desc:'孕酮升高，情绪敏感',color:'#D4B060'}];
  var ringR=42,ringC=52,circ=2*Math.PI*ringR;
  function arc(sf,lf,c){var off=circ*(1-sf)+circ*0.25;return '<circle cx="'+ringC+'" cy="'+ringC+'" r="'+ringR+'" fill="none" stroke="'+c+'" stroke-width="7" stroke-dasharray="'+(circ*lf)+' '+(circ*(1-lf))+'" stroke-dashoffset="'+off+'" stroke-linecap="round"/>';}
  var pF=5/info.avgCycle,fF=(ovulDay-7)/info.avgCycle,oF=3/info.avgCycle,lF=(info.avgCycle-ovulDay-1)/info.avgCycle;
  var ma=(info.daysInCycle/info.avgCycle)*360-90;var mx=ringC+ringR*Math.cos(ma*Math.PI/180),my=ringC+ringR*Math.sin(ma*Math.PI/180);
  sec.innerHTML='<div class="ring-row"><div class="ring-wrap"><svg viewBox="0 0 104 104"><circle cx="'+ringC+'" cy="'+ringC+'" r="'+ringR+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="7"/>'+arc(0,pF,'#E8A090')+arc(pF,fF,'#7EB8D8')+arc(pF+fF,oF,'#5CD0A0')+arc(pF+fF+oF,lF,'#D4B060')+'<circle cx="'+mx+'" cy="'+my+'" r="4.5" fill="white" opacity=".9"/></svg><div class="ring-center"><div class="ring-day serif">'+(info.daysInCycle+1)+'</div><div class="ring-day-label">第 '+(info.daysInCycle+1)+' 天</div></div></div><div class="ring-info"><div class="phase-name serif" style="color:'+ph.color+'">'+ph.name+'</div><div class="phase-desc">'+ph.desc+'</div>'+(info.daysUntilNext>=0?'<div class="phase-next">距下次经期 · '+info.daysUntilNext+' 天</div>':'')+'</div></div><div class="sep"></div><div class="timeline">';
  for(var i=0;i<sections.length;i++){var s=sections[i];var ic=s.key===info.currentPhase;sec.innerHTML+='<div class="tl-row'+(ic?' curr':'')+'"><div class="tl-left"><div class="tl-dot" style="background:'+s.color+'"></div><div class="tl-line"></div></div><div class="tl-right"><div class="tl-name serif">'+s.name+'<span class="tl-range">'+s.range+'</span></div><div class="tl-desc">'+s.desc+'</div></div></div>';}
  sec.innerHTML+='</div>';document.getElementById('stats-grid').style.display='';document.getElementById('stat-last').textContent=fmtDisplay(info.latest.start_date);document.getElementById('stat-cycle').textContent=info.avgCycle+' 天';document.getElementById('stat-next').textContent=info.nextPredicted?fmtDisplay(info.nextPredicted):'—';renderHistory();
}
function renderHistory(){
  var real=[];for(var i=0;i<records.length;i++){if(records[i].notes!=='marked')real.push(records[i]);}
  var sec=document.getElementById('history-section');if(real.length===0&&ovulRecords.length===0){sec.style.display='none';return;}sec.style.display='';
  real.sort(function(a,b){return new Date(b.start_date)-new Date(a.start_date);});var sortedOvul=[];for(var i=0;i<ovulRecords.length;i++)sortedOvul.push(ovulRecords[i]);sortedOvul.sort(function(a,b){return new Date(b.ovulation_date)-new Date(a.ovulation_date);});
  var html='';for(var i=0;i<real.length;i++){var r=real[i];html+='<div class="hist-item"><div class="hist-dot"></div><div class="hist-date serif">'+fmtDisplay(r.start_date)+'</div><div class="hist-meta">经期 · 持续 '+(r.duration||5)+' 天</div><div class="hist-del" onclick="deleteRecord(\''+r.start_date+'\')">删除</div></div>';}
  for(var i=0;i<sortedOvul.length;i++){var r=sortedOvul[i];html+='<div class="hist-item"><div class="ovul-hist-dot" style="background:#5CD0A0;width:5px;height:5px;border-radius:50%;flex-shrink:0"></div><div class="hist-date serif">'+fmtDisplay(r.ovulation_date)+'</div><div class="hist-meta">排卵期</div><div class="hist-del" onclick="deleteOvulRecord(\''+r.ovulation_date+'\')">删除</div></div>';}
  document.getElementById('history-list').innerHTML=html;
}
var MONTH_NAMES=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
var MONTH_EN=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
function renderCalendar(){
  document.getElementById('cal-month-title').textContent=MONTH_NAMES[curMonth];document.getElementById('cal-year-title').textContent=MONTH_EN[curMonth].slice(0,3)+' '+curYear;
  var today=fmt(new Date()),first=new Date(curYear,curMonth,1),last=new Date(curYear,curMonth+1,0);var startDay=first.getDay();var html='';
  for(var i=0;i<startDay;i++)html+='<div class="day empty"><div class="day-num"></div><div class="day-dot"></div></div>';
  for(var d=1;d<=last.getDate();d++){var ds=curYear+'-'+(curMonth<9?'0':'')+(curMonth+1)+'-'+(d<10?'0':'')+d;var info=getPhaseForDate(ds);var isToday=ds===today;var hasOvul=false;for(var i=0;i<ovulRecords.length;i++){if(ovulRecords[i].ovulation_date===ds){hasOvul=true;break;}}var cls='day';if(info){cls+=' phase-'+info.phase;if(info.isStart&&info.phase==='period')cls+=' period-start';if(info.isStart&&info.phase==='ovulation')cls+=' ovul-start';}if(hasOvul)cls+=' has-ovulation';if(isToday)cls+=' is-today';html+='<div class="'+cls+'" onclick="onDayClick(\''+ds+'\')"><div class="day-num">'+d+'</div><div class="day-dot"></div></div>';}
  document.getElementById('days-grid').innerHTML=html;renderPhaseStrip();
}
function renderPhaseStrip(){
  var o=calcCycle();var cp=o.currentPhase;var ac=o.avgCycle;var ovulDay=ac-14;
  var items=[{key:'period',name:'月经期',range:'第 1–5 天',tip:'保暖休息，热敷缓解',color:'#E8A090'},{key:'follicular',name:'卵泡期',range:'第 6–'+(ovulDay-2)+' 天',tip:'精力旺盛，适合运动',color:'#7EB8D8'},{key:'ovulation',name:'排卵期',range:'第 '+ovulDay+' 天',tip:'体温微升，白带拉丝',color:'#5CD0A0'},{key:'luteal',name:'黄体期',range:'第 '+(ovulDay+2)+'–'+ac+' 天',tip:'孕酮升高，情绪敏感',color:'#D4B060'}];
  var html='';for(var i=0;i<items.length;i++){var it=items[i];var ic=it.key===cp;html+='<div class="phase-strip-item'+(ic?' curr':'')+'"><div class="ps-dot" style="background:'+it.color+'"></div><div class="ps-info"><div class="ps-name serif">'+it.name+' · '+it.range+'</div><div class="ps-tip">'+it.tip+'</div></div>'+(ic?'<div class="ps-tag" style="background:rgba(255,255,255,0.07);color:#8A7A6A">当前</div>':'')+'</div>';}
  document.getElementById('phase-strip').innerHTML=html;
}
function switchTab(idx,anim){
  currentTab=idx;var wrapper=document.getElementById('swipe-wrapper');if(anim===false)wrapper.style.transition='none';wrapper.style.transform='translateX(-'+(idx*100)+'%)';if(anim===false)setTimeout(function(){wrapper.style.transition='';},0);
  document.getElementById('tab-0').classList.toggle('active',idx===0);document.getElementById('tab-1').classList.toggle('active',idx===1);
  var bar=document.getElementById('tab-bar');var tabs=bar.querySelectorAll('.tab');var line=document.getElementById('tab-line');var t=tabs[idx];line.style.left=t.offsetLeft+'px';line.style.width=t.offsetWidth+'px';
}
function prevMonth(){curMonth--;if(curMonth<0){curMonth=11;curYear--;}renderCalendar();}
function nextMonth(){curMonth++;if(curMonth>11){curMonth=0;curYear++;}renderCalendar();}
function goToday(){var n=new Date();curYear=n.getFullYear();curMonth=n.getMonth();renderCalendar();}
function onDayClick(ds){
  selectedDate=ds;document.getElementById('sheet-date').textContent=fmtDateLabel(ds);
  var existing=null;for(var i=0;i<records.length;i++){if(records[i].start_date===ds){existing=records[i];break;}}
  var existingOvul=null;for(var i=0;i<ovulRecords.length;i++){if(ovulRecords[i].ovulation_date===ds){existingOvul=ovulRecords[i];break;}}
  if(existing&&existing.notes!=='marked')selectOpt('clear');else if(existingOvul)selectOpt('clear');else selectOpt('period');
  var els=document.querySelectorAll('.day');for(var i=0;i<els.length;i++)els[i].classList.remove('selected');
  var allDays=document.querySelectorAll('#days-grid .day:not(.empty)');var dayNum=new Date(ds+'T00:00:00').getDate();if(allDays[dayNum-1])allDays[dayNum-1].classList.add('selected');
  document.getElementById('sheet-overlay').classList.add('open');
}
function closeSheet(){document.getElementById('sheet-overlay').classList.remove('open');var els=document.querySelectorAll('.day.selected');for(var i=0;i<els.length;i++)els[i].classList.remove('selected');selectedDate=null;}
function onOverlayClick(e){if(e.target===document.getElementById('sheet-overlay'))closeSheet();}
function selectOpt(opt){
  selectedOpt=opt;var opts=['period','ovulation','mark','clear'];
  for(var i=0;i<opts.length;i++){var k=opts[i];var el=document.getElementById('opt-'+k);var chk=el.querySelector('.sheet-check');if(k===opt){el.classList.add('active');chk.textContent='✓';}else{el.classList.remove('active');chk.textContent='';}}
  document.getElementById('duration-row').style.display=(opt==='period'?'':'none');
}
function changeDur(d){duration=Math.max(1,Math.min(10,duration+d));document.getElementById('dur-val').textContent=duration;}
async function saveRecord(){
  if(!selectedDate)return;var btn=document.getElementById('btn-save');btn.disabled=true;
  try{
    if(selectedOpt==='clear'){
      await qry('/period_records?start_date=eq.'+selectedDate,{method:'DELETE'});var newRec=[];for(var i=0;i<records.length;i++){if(records[i].start_date!==selectedDate)newRec.push(records[i]);}records=newRec;
      await qry('/ovulation_records?ovulation_date=eq.'+selectedDate,{method:'DELETE'});var newOvul=[];for(var i=0;i<ovulRecords.length;i++){if(ovulRecords[i].ovulation_date!==selectedDate)newOvul.push(ovulRecords[i]);}ovulRecords=newOvul;
      showToast('已清除记录');
    }else if(selectedOpt==='ovulation'){
      var ex=null;for(var i=0;i<ovulRecords.length;i++){if(ovulRecords[i].ovulation_date===selectedDate){ex=ovulRecords[i];break;}}
      if(ex){showToast('这天已经记录过排卵期了');}else{var result=await qry('/ovulation_records',{method:'POST',body:JSON.stringify({ovulation_date:selectedDate,notes:''})});ovulRecords.push(result[0]);showToast('已记录排卵期');}
    }else if(selectedOpt==='mark'){
      var ex=null;for(var i=0;i<records.length;i++){if(records[i].start_date===selectedDate){ex=records[i];break;}}
      if(ex){await qry('/period_records?start_date=eq.'+selectedDate,{method:'PATCH',body:JSON.stringify({notes:'marked',duration:1})});ex.notes='marked';ex.duration=1;}
      else{var result=await qry('/period_records',{method:'POST',body:JSON.stringify({start_date:selectedDate,notes:'marked',duration:1})});records.push(result[0]);}
      showToast('已标记');
    }else{
      var ex=null;for(var i=0;i<records.length;i++){if(records[i].start_date===selectedDate){ex=records[i];break;}}
      if(ex){await qry('/period_records?start_date=eq.'+selectedDate,{method:'PATCH',body:JSON.stringify({notes:'',duration:duration})});ex.notes='';ex.duration=duration;}
      else{var result=await qry('/period_records',{method:'POST',body:JSON.stringify({start_date:selectedDate,notes:'',duration:duration})});records.push(result[0]);}
      showToast('已记录月经期开始');
    }
    closeSheet();renderStatus();renderCalendar();
  }catch(e){showToast('保存失败：'+e.message);}finally{btn.disabled=false;}
}
async function deleteRecord(dateStr){
  if(!confirm('确认删除 '+fmtDisplay(dateStr)+' 的记录？'))return;
  try{await qry('/period_records?start_date=eq.'+dateStr,{method:'DELETE'});var newRec=[];for(var i=0;i<records.length;i++){if(records[i].start_date!==dateStr)newRec.push(records[i]);}records=newRec;showToast('已删除');renderStatus();renderCalendar();}catch(e){showToast('删除失败');}
}
async function deleteOvulRecord(dateStr){
  if(!confirm('确认删除 '+fmtDisplay(dateStr)+' 的排卵期记录？'))return;
  try{await qry('/ovulation_records?ovulation_date=eq.'+dateStr,{method:'DELETE'});var newOvul=[];for(var i=0;i<ovulRecords.length;i++){if(ovulRecords[i].ovulation_date!==dateStr)newOvul.push(ovulRecords[i]);}ovulRecords=newOvul;showToast('已删除');renderStatus();renderCalendar();}catch(e){showToast('删除失败');}
}
async function init(){
  try{
    var data=await qry('/period_records?order=start_date.asc');records=[];for(var i=0;i<(data||[]).length;i++){var r=data[i];r.duration=r.duration||5;records.push(r);}
    var ovulData=await qry('/ovulation_records?order=ovulation_date.asc');ovulRecords=ovulData||[];
    renderStatus();renderCalendar();setTimeout(function(){switchTab(0,false);},50);
  }catch(e){document.getElementById('status-section').innerHTML='<div class="loading-state" style="color:#e85d75">加载失败：'+e.message+'</div>';}
}
init();
</script>
</body>
