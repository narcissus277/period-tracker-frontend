<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>🌙 牵牵的月相</title>
<meta name="theme-color" content="#0d1b3e">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="牵牵的月相">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
<style>
:root{--bg-from:#FFF9F0;--bg-mid:#FFFDF5;--bg-to:#FFFBF0;--card:rgba(255, 248, 235, 0.8);--card-border:rgba(200, 180, 150, 0.2);--text:#4A3F35;--text-dim:#B8A99A;--text-mid:#8A7A6A;--accent:#D48C7A;--period:#E8A090;--follicular:#7EB8D8;--ovulation:#5CD0A0;--luteal:#D4B060;--today:#4ECDC4;--predict:#9B8AF0;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}html,body{height:100%;overflow:hidden;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(160deg,var(--bg-from) 0%,var(--bg-mid) 50%,var(--bg-to) 100%);background-attachment:fixed;color:var(--text);height:100%;overflow:hidden;}.serif{font-family:Georgia,'Times New Roman',serif;}.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;}.top-area{flex-shrink:0;padding-top:env(safe-area-inset-top,0);}.page-header{text-align:center;padding:24px 20px 14px;}.page-title{font-size:22px;font-weight:300;color:var(--text);letter-spacing:2px;}.page-sub{font-size:10px;color:var(--text-dim);letter-spacing:2.5px;margin-top:5px;text-transform:uppercase;}.tab-bar{display:flex;position:relative;border-bottom:1px solid rgba(150,130,110,0.15);padding:0 24px;margin-top:4px;}.tab{flex:1;text-align:center;padding:12px 0 13px;font-size:13px;color:var(--text-dim);letter-spacing:.5px;cursor:pointer;transition:color .2s;position:relative;user-select:none;}.tab.active{color:var(--text);}.tab-line{position:absolute;bottom:-1px;height:1.5px;background:rgba(200,220,255,0.6);border-radius:2px 2px 0 0;transition:left .3s cubic-bezier(.4,0,.2,1),width .3s cubic-bezier(.4,0,.2,1);left:24px;width:calc(50% - 24px);}.swipe-container{flex:1;overflow:hidden;position:relative;}.swipe-wrapper{display:flex;height:100%;transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform;}.swipe-page{flex:0 0 100%;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:env(safe-area-inset-bottom,0);}.swipe-page::-webkit-scrollbar{display:none;}.section{margin:0 16px 14px;background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:18px;}.section-top{margin-top:20px;}.ring-row{display:flex;align-items:center;gap:20px;margin-bottom:18px;}.ring-wrap{position:relative;width:100px;height:100px;flex-shrink:0;}.ring-wrap svg{width:100px;height:100px;}.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}.ring-day{font-size:26px;font-weight:300;color:var(--text);line-height:1;}.ring-day-label{font-size:9px;color:var(--text-dim);letter-spacing:.5px;}.phase-name{font-size:20px;font-weight:300;letter-spacing:1px;margin-bottom:6px;}.phase-desc{font-size:11px;color:var(--text-mid);line-height:1.8;font-weight:300;}.phase-next{font-size:11px;color:var(--predict);margin-top:8px;letter-spacing:.3px;}.sep{height:1px;background:rgba(255,255,255,0.06);margin:16px 0;}.timeline{display:flex;flex-direction:column;}.tl-row{display:flex;gap:14px;align-items:stretch;}.tl-left{display:flex;flex-direction:column;align-items:center;width:18px;flex-shrink:0;padding-top:2px;}.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}.tl-row.curr .tl-dot{box-shadow:0 0 0 3px rgba(255,255,255,0.1);}.tl-line{width:1px;background:rgba(255,255,255,0.06);flex:1;margin:4px 0;}.tl-row:last-child .tl-line{display:none;}.tl-right{flex:1;padding-bottom:14px;}.tl-row:last-child .tl-right{padding-bottom:0;}.tl-name{font-size:12px;color:var(--text-mid);display:flex;justify-content:space-between;align-items:baseline;font-weight:300;}.tl-row.curr .tl-name{color:var(--text);}.tl-range{font-size:10px;color:var(--text-dim);}.tl-row.curr .tl-range{color:inherit;opacity:.7;}.tl-desc{font-size:10px;color:var(--text-dim);margin-top:3px;line-height:1.6;}.tl-row.curr .tl-desc{color:var(--text-mid);}.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 16px 14px;}.stat-item{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:12px 8px;text-align:center;}.stat-value{font-size:14px;color:var(--text);font-weight:300;letter-spacing:.5px;}.stat-label{font-size:9px;color:var(--text-dim);margin-top:5px;letter-spacing:1px;text-transform:uppercase;}.hist-title{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}.hist-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,248,235,0.5);}.hist-item:last-child{border-bottom:none;}.hist-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;}.hist-date{font-size:13px;font-weight:300;letter-spacing:.5px;}.hist-meta{font-size:10px;color:var(--text-dim);margin-left:auto;}.hist-del{font-size:10px;color:var(--text-dim);padding:3px 8px;border:1px solid rgba(255,255,255,0.08);border-radius:20px;cursor:pointer;transition:all .15s;margin-left:8px;}.hist-del:hover{border-color:var(--accent);color:var(--accent);}.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;margin-bottom:16px;}.cal-month{font-size:22px;font-weight:300;letter-spacing:2px;}.cal-year{font-size:10px;color:var(--text-dim);letter-spacing:3px;margin-top:2px;}.cal-arrows{display:flex;align-items:center;gap:16px;}.cal-arr{font-size:14px;color:var(--text-dim);cursor:pointer;padding:6px;transition:color .15s;}.cal-arr:hover{color:var(--text);}.cal-today-btn{font-size:10px;color:var(--text-mid);cursor:pointer;letter-spacing:.5px;padding:5px 10px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;transition:all .15s;}.cal-wrap{padding:0 16px;}.wday-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px;}.wday{text-align:center;font-size:9px;color:var(--text-dim);letter-spacing:.5px;padding:4px 0;}.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}.day{height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;gap:4px;cursor:pointer;transition:background .15s;user-select:none;position:relative;}.day:hover{background:rgba(255,255,255,0.06);}.day.empty{cursor:default;pointer-events:none;}.day-num{font-size:13px;font-weight:300;color:var(--text-dim);line-height:1;}.day-dot{width:5px;height:5px;border-radius:50%;opacity:0;}.day.phase-period .day-num{color:var(--period);}.day.phase-period .day-dot{background:var(--period);opacity:1;}.day.phase-follicular .day-num{color:var(--follicular);}.day.phase-follicular .day-dot{background:var(--follicular);opacity:1;}.day.phase-ovulation .day-num{color:var(--ovulation);}.day.phase-ovulation .day-dot{background:var(--ovulation);opacity:1;}.day.phase-luteal .day-num{color:var(--luteal);}.day.phase-luteal .day-dot{background:var(--luteal);opacity:1;}.day.phase-pred-period .day-num{color:var(--period);opacity:.5;}.day.phase-pred-period .day-dot{background:var(--period);opacity:.35;}.day.phase-pred-follicular .day-num{color:var(--follicular);opacity:.5;}.day.phase-pred-follicular .day-dot{background:var(--follicular);opacity:.35;}.day.phase-pred-ovulation .day-num{color:var(--ovulation);opacity:.5;}.day.phase-pred-ovulation .day-dot{background:var(--ovulation);opacity:.35;}.day.phase-pred-luteal .day-num{color:var(--luteal);opacity:.5;}.day.phase-pred-luteal .day-dot{background:var(--luteal);opacity:.35;}.day.is-today .day-num{opacity:1!important;}.day.is-today::after{content:'';position:absolute;bottom:3px;width:3px;height:3px;border-radius:50%;background:var(--today);}.day.is-today.phase-period .day-num,.day.is-today.phase-pred-period .day-num{color:var(--period)!important;}.day.is-today.phase-period,.day.is-today.phase-pred-period{background:rgba(212,120,138,0.22);}.day.is-today.phase-follicular .day-num,.day.is-today.phase-pred-follicular .day-num{color:var(--follicular)!important;}.day.is-today.phase-follicular,.day.is-today.phase-pred-follicular{background:rgba(104,152,216,0.22);}.day.is-today.phase-ovulation .day-num,.day.is-today.phase-pred-ovulation .day-num{color:var(--ovulation)!important;}.day.is-today.phase-ovulation,.day.is-today.phase-pred-ovulation{background:rgba(64,192,144,0.22);}.day.is-today.phase-luteal .day-num,.day.is-today.phase-pred-luteal .day-num{color:var(--luteal)!important;}.day.is-today.phase-luteal,.day.is-today.phase-pred-luteal{background:rgba(200,152,64,0.22);}.day.selected{outline:1.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);}.day.has-ovulation::before{content:'✿';position:absolute;top:2px;right:3px;font-size:8px;color:var(--ovulation);opacity:.9;}.ovul-hist-dot{width:5px;height:5px;border-radius:50%;background:var(--ovulation);flex-shrink:0;}.legend{display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center;padding:14px 16px 0;}.legend-item{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--text-dim);letter-spacing:.5px;}.legend-dot{width:7px;height:7px;border-radius:50%;}.phase-strip{margin:14px 16px 0;display:flex;flex-direction:column;gap:8px;}.phase-strip-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;}.phase-strip-item.curr{border-color:rgba(255,255,255,0.15);}.ps-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.ps-info{flex:1;}.ps-name{font-size:12px;font-weight:300;}.ps-tip{font-size:10px;color:var(--text-dim);margin-top:2px;}.ps-tag{font-size:9px;padding:3px 9px;border-radius:20px;letter-spacing:.5px;flex-shrink:0;}.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;transition:background .25s;}.sheet-overlay.open{background:rgba(0,0,0,0.15);pointer-events:all;}.sheet{width:100%;max-width:480px;background:#FFF9F0;border-radius:22px 22px 0 0;padding:16px 20px calc(24px + env(safe-area-inset-bottom,0));transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);border-top:1px solid rgba(255,255,255,0.08);}.sheet-overlay.open .sheet{transform:translateY(0);}.sheet-handle{width:36px;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;margin:0 auto 18px;}.sheet-date-label{font-size:12px;color:var(--text-mid);letter-spacing:.5px;margin-bottom:4px;}.sheet-title{font-size:18px;font-weight:300;letter-spacing:1px;margin-bottom:18px;}.sheet-options{display:flex;flex-direction:column;gap:10px;}.sheet-opt{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:14px;background:rgba(255,248,235,0.5);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all .15s;}.sheet-opt:hover{background:rgba(255,255,255,0.08);}.sheet-opt.active{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);}.sheet-opt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}.sheet-opt-info{flex:1;}.sheet-opt-name{font-size:13px;font-weight:300;}.sheet-opt-sub{font-size:10px;color:var(--text-dim);margin-top:3px;}.sheet-check{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all .15s;}.sheet-opt.active .sheet-check{background:var(--accent);border-color:var(--accent);color:white;}.duration-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0 0;}.duration-label{font-size:12px;color:var(--text-mid);}.duration-ctrl{display:flex;align-items:center;gap:14px;}.dur-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;}.dur-val{font-size:16px;font-weight:300;min-width:24px;text-align:center;}.sheet-btns{display:flex;gap:10px;margin-top:18px;}.btn-cancel{flex:1;padding:13px;border-radius:12px;background:rgba(255,248,235,0.5);border:1px solid rgba(255,255,255,0.08);color:var(--text-mid);font-size:13px;font-family:system-ui,sans-serif;cursor:pointer;}.btn-save{flex:2;padding:13px;border-radius:12px;background:var(--accent);border:none;color:white;font-size:13px;font-family:system-ui,sans-serif;cursor:pointer;letter-spacing:.5px;}.btn-save:disabled{opacity:.4;cursor:not-allowed;}.loading-state{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:13px;}.toast{position:fixed;top:calc(20px + env(safe-area-inset-top,0));left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(20,30,56,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:30px;padding:10px 20px;font-size:12px;color:var(--text);z-index:300;transition:transform .3s cubic-bezier(.4,0,.2,1);white-space:nowrap;}.toast.show{transform:translateX(-50%) translateY(0);}</style></head><body><div class="app"><div class="top-area"><div class="page-header serif"><div class="page-title">牵牵的月相</div><div class="page-sub">by 德拉 · 守护你每一天</div></div><div class="tab-bar" id="tab-bar"><div class="tab active" id="tab-0" onclick="switchTab(0)">状态</div><div class="tab" id="tab-1" onclick="switchTab(1)">日历</div><div class="tab-line" id="tab-line"></div></div></div><div class="swipe-container" id="swipe-container"><div class="swipe-wrapper" id="swipe-wrapper"><div class="swipe-page"><div class="section section-top" id="status-section"><div class="loading-state">加载中...</div></div><div class="stats-grid" id="stats-grid" style="display:none"><div class="stat-item"><div class="stat-value serif" id="stat-last">—</div><div class="stat-label">上次经期</div></div><div class="stat-item"><div class="stat-value serif" id="stat-cycle">—</div><div class="stat-label">平均周期</div></div><div class="stat-item"><div class="stat-value serif" id="stat-next" style="color:var(--predict)">—</div><div class="stat-label">预测下次</div></div></div><div class="section" id="history-section" style="display:none"><div class="hist-title">历史记录</div><div id="history-list"></div></div></div><div class="swipe-page"><div class="cal-nav"><div class="serif"><div class="cal-month" id="cal-month-title">五月</div><div class="cal-year" id="cal-year-title">MAY 2025</div></div><div class="cal-arrows"><span class="cal-arr" onclick="prevMonth()">◀</span><span class="cal-today-btn" onclick="goToday()">今天</span><span class="cal-arr" onclick="nextMonth()">▶</span></div></div><div class="cal-wrap"><div class="wday-row"><div class="wday">日</div><div class="wday">一</div><div class="wday">二</div><div class="wday">三</div><div class="wday">四</div><div class="wday">五</div><div class="wday">六</div></div><div class="days-grid" id="days-grid"></div></div><div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--period)"></div>月经期</div><div class="legend-item"><div class="legend-dot" style="background:var(--follicular)"></div>卵泡期</div><div class="legend-item"><div class="legend-dot" style="background:var(--ovulation)"></div>排卵期</div><div class="legend-item"><div class="legend-dot" style="background:var(--luteal)"></div>黄体期</div><div class="legend-item"><div class="legend-dot" style="background:var(--today)"></div>今天</div></div><div class="phase-strip" id="phase-strip"></div></div></div></div></div><div class="sheet-overlay" id="sheet-overlay" onclick="onOverlayClick(event)"><div class="sheet serif"><div class="sheet-handle"></div><div class="sheet-date-label" id="sheet-date"></div><div class="sheet-title">记录这一天</div><div class="sheet-options"><div class="sheet-opt active" id="opt-period" onclick="selectOpt('period')"><div class="sheet-opt-dot" style="background:var(--period)"></div><div class="sheet-opt-info"><div class="sheet-opt-name">月经期开始</div><div class="sheet-opt-sub">自动标注后续天数，重新计算预测</div></div><div class="sheet-check">✓</div></div><div class="sheet-opt" id="opt-ovulation" onclick="selectOpt('ovulation')"><div class="sheet-opt-dot" style="background:var(--ovulation)"></div><div class="sheet-opt-info"><div class="sheet-opt-name">排卵期</div><div class="sheet-opt-sub">记录感觉到的排卵期日期</div></div><div class="sheet-check"></div></div><div class="sheet-opt" id="opt-mark" onclick="selectOpt('mark')"><div class="sheet-opt-dot" style="background:var(--text-mid)"></div><div class="sheet-opt-info"><div class="sheet-opt-name">仅标记</div><div class="sheet-opt-sub">标注这天，不影响预测计算</div></div><div class="sheet-check"></div></div><div class="sheet-opt" id="opt-clear" onclick="selectOpt('clear')"><div class="sheet-opt-dot" style="background:rgba(255,255,255,0.2)"></div><div class="sheet-opt-info"><div class="sheet-opt-name">清除记录</div><div class="sheet-opt-sub">移除这天的所有标注</div></div><div class="sheet-check"></div></div></div><div class="duration-row" id="duration-row"><span class="duration-label">经期天数</span><div class="duration-ctrl"><div class="dur-btn" onclick="changeDur(-1)">−</div><div class="dur-val" id="dur-val">5</div><div class="dur-btn" onclick="changeDur(1)">+</div></div></div><div class="sheet-btns"><div class="btn-cancel" onclick="closeSheet()">取消</div><div class="btn-save" id="btn-save" onclick="saveRecord()">保存记录</div></div></div></div><div class="toast" id="toast"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="app.js"></script></body></html>
